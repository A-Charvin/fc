<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontenac Road Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>

  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #10b981;
      color: white;
      padding: 8px;
      z-index: 100;
      transition: top 0.2s;
    }
    .skip-link:focus {
      top: 0;
    }
    #suggestions {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #suggestions.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #toast {
      transition: opacity 0.3s, transform 0.3s;
    }
  </style>
</head>
<body class="bg-zinc-50 text-zinc-900 font-sans antialiased transition-colors duration-300 dark:bg-zinc-950 dark:text-zinc-100">
  
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <header class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-4">
      <div>
        <h1 class="text-3xl md:text-4xl tracking-tight font-semibold">Frontenac Road Search</h1>
        <p class="mt-2 text-zinc-500 dark:text-zinc-400 text-base">Search the municipal road network. Filter by township or enter a road name directly.</p>
        <p id="lastUpdated" class="mt-1 text-xs text-zinc-400 dark:text-zinc-600"></p>
      </div>
      <button id="darkModeToggle" class="flex items-center space-x-2 px-3 py-1.5 text-sm font-medium text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-lg transition-colors duration-200 self-start md:self-auto">
        <i class="ph-bold ph-moon dark:hidden"></i>
        <i class="ph-bold ph-sun hidden dark:inline-block"></i>
        <span>Theme</span>
      </button>
    </header>

    <div id="loadingIndicatorGlobal" class="hidden flex items-center justify-center space-x-3 py-8">
      <div class="w-5 h-5 border-2 border-zinc-300 dark:border-zinc-700 border-t-emerald-500 rounded-full animate-spin"></div>
      <p id="loadingTextGlobal" class="text-sm text-zinc-500 dark:text-zinc-400">Loading initial road data...</p>
    </div>

    <main id="main-content" class="grid grid-cols-1 lg:grid-cols-12 gap-12">
      
      <div class="lg:col-span-8 space-y-8">
        <div class="relative">
          <label for="roadSearch" class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-2">Road Name</label>
          <input 
            type="text" 
            class="w-full px-4 py-3 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg text-base placeholder:text-zinc-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all duration-300" 
            id="roadSearch" 
            placeholder="Start typing a road name..."
            role="combobox"
            aria-expanded="false"
            aria-controls="suggestions"
            aria-autocomplete="list"
            aria-haspopup="listbox"
          >
          
          <div id="suggestions" class="absolute z-20 w-full mt-2 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg shadow-[0_10px_40px_-15px_rgba(0,0,0,0.05)] overflow-hidden divide-y divide-zinc-100 dark:divide-zinc-800" role="listbox"></div>
        </div>

        <div id="result" class="hidden pl-4 border-l-4 border-zinc-200 dark:border-zinc-800 py-3 relative" aria-live="polite">
          <button id="clearResultBtn" class="absolute top-2 right-2 p-1 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 transition-colors" aria-label="Dismiss result">
            <i class="ph-bold ph-x"></i>
          </button>
          <p id="resultText" class="text-base text-zinc-700 dark:text-zinc-300 flex items-start pr-6"></p>
        </div>

        <div id="similarResults" class="hidden mt-8 space-y-3">
          <h5 class="text-sm font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wider">Similar road names</h5>
          <ul id="similarNames" class="divide-y divide-zinc-100 dark:divide-zinc-800 border-t border-b border-zinc-200 dark:border-zinc-800"></ul>
        </div>
      </div>
      
      <div class="lg:col-span-4 space-y-8">
        <div class="space-y-4">
          <label for="municipalityFilter" class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Filter by Municipality</label>
          <select id="municipalityFilter" class="w-full px-4 py-3 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all duration-300">
            <option value="">All Municipalities</option>
          </select>
          <button id="showByMunicipalityBtn" class="w-full px-4 py-2.5 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 text-sm font-medium rounded-lg hover:bg-zinc-800 dark:hover:bg-zinc-200 transition-all duration-200 active:-translate-y-[1px] disabled:opacity-50 disabled:cursor-not-allowed disabled:active:translate-y-0">
            Show Roads in Municipality
          </button>
        </div>
        
        <div id="municipalityRoadsResult" class="hidden space-y-3">
          <div class="flex items-center justify-between">
            <h5 class="text-sm font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wider">Roads in <span id="selectedMunDisplay"></span></h5>
            <span id="munRoadCount" class="text-xs font-medium text-zinc-400 dark:text-zinc-500 bg-zinc-100 dark:bg-zinc-800 px-2 py-1 rounded-full"></span>
          </div>
          <div class="max-h-96 overflow-y-auto border border-zinc-200 dark:border-zinc-800 rounded-lg divide-y divide-zinc-100 dark:divide-zinc-800">
            <ul id="municipalityRoadsList"></ul>
          </div>
        </div>
        
        <div class="pt-8 border-t border-zinc-200 dark:border-zinc-800 space-y-3">
          <button id="exportCSV" class="w-full px-4 py-2.5 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 text-zinc-700 dark:text-zinc-300 text-sm font-medium rounded-lg hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all duration-200 active:-translate-y-[1px] disabled:opacity-50 disabled:cursor-not-allowed">
            Export to CSV
          </button>
          <button id="clearResults" class="w-full px-4 py-2.5 text-zinc-500 dark:text-zinc-400 text-sm font-medium rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all duration-200 active:-translate-y-[1px]">
            Clear Results
          </button>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="fixed bottom-6 right-6 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-4 py-3 rounded-lg shadow-lg opacity-0 translate-y-4 pointer-events-none flex items-center space-x-2">
    <i class="ph-bold ph-check-circle text-emerald-400 dark:text-emerald-600"></i>
    <span id="toastMessage">Exported successfully</span>
  </div>

  <footer class="max-w-7xl mx-auto px-6 py-12 text-center text-sm text-zinc-400 dark:text-zinc-600">
    <p><span style="color: #e25555">Made with &hearts; in Frontenac County &copy; <span id="currentYear"> County of Frontenac</span></p>
  <script>
    const roadSearch = document.getElementById('roadSearch');
    const suggestionsDiv = document.getElementById('suggestions');
    const result = document.getElementById('result');
    const resultText = document.getElementById('resultText');
    const clearResultBtn = document.getElementById('clearResultBtn');
    const exportBtn = document.getElementById('exportCSV');
    const clearResultsBtn = document.getElementById('clearResults');
    const similarResults = document.getElementById('similarResults');
    const similarNamesList = document.getElementById('similarNames');
    const municipalityFilter = document.getElementById('municipalityFilter');
    const showByMunicipalityBtn = document.getElementById('showByMunicipalityBtn');
    const municipalityRoadsResult = document.getElementById('municipalityRoadsResult');
    const municipalityRoadsList = document.getElementById('municipalityRoadsList');
    const selectedMunDisplay = document.getElementById('selectedMunDisplay');
    const munRoadCount = document.getElementById('munRoadCount');
    const loadingIndicatorGlobal = document.getElementById('loadingIndicatorGlobal');
    const loadingTextGlobal = document.getElementById('loadingTextGlobal');
    const lastUpdatedEl = document.getElementById('lastUpdated');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    let roadData = [];
    let currentSearchPool = [];
    let uniqueNormalizedMunicipalities = new Set();
    let selectedSuggestionIndex = -1;

    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    function levenshtein(a, b) {
      if (a.length === 0) return b.length;
      if (b.length === 0) return a.length;
      const matrix = [];
      for (let i = 0; i <= b.length; i++) matrix[i] = [i];
      for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(
              matrix[i - 1][j - 1] + 1,
              matrix[i][j - 1] + 1,
              matrix[i - 1][j] + 1
            );
          }
        }
      }
      return matrix[b.length][a.length];
    }

    function showToast(message) {
      toastMessage.textContent = message;
      toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 3000);
    }

    function normalizeMunicipalityName(name) {
      if (!name) return "";
      let normalized = name.trim().toUpperCase();
      normalized = normalized.replace(/\bFRONTEANC\b/g, "FRONTENAC");
      if (normalized.startsWith("TOWNSHIP OF ")) {
          normalized = normalized.substring("TOWNSHIP OF ".length).trim();
          if (!normalized.endsWith(" TOWNSHIP") && normalized !== "FRONTENAC ISLANDS") normalized += " TOWNSHIP";
      } else if (normalized.startsWith("TWP OF ")) {
          normalized = normalized.substring("TWP OF ".length).trim();
          if (!normalized.endsWith(" TOWNSHIP") && normalized !== "FRONTENAC ISLANDS") normalized += " TOWNSHIP";
      }
      normalized = normalized.replace(/\s+TWP$/, " TOWNSHIP");
      normalized = normalized.replace(/\s+TWP\.$/, " TOWNSHIP");
      normalized = normalized.replace(/\s+TOWNSHIPS$/, " TOWNSHIP");
      const coreTownships = ["CENTRAL FRONTENAC", "NORTH FRONTENAC", "SOUTH FRONTENAC"];
      if (coreTownships.includes(normalized) && !normalized.endsWith(" TOWNSHIP")) normalized += " TOWNSHIP";
      return normalized.replace(/\s+/g, " ").trim();
    }

    async function fetchAllRoadData() {
      roadData = [];
      uniqueNormalizedMunicipalities = new Set();
      let allEntries = new Set();
      let offset = 0;
      const pageSize = 1000;
      let keepFetching = true;
      let totalFetched = 0;

      loadingIndicatorGlobal.classList.remove('hidden');
      loadingTextGlobal.textContent = 'Connecting to the road database...';
      result.classList.add('hidden');
      exportBtn.disabled = true;

      while (keepFetching) {
        const url = `https://services2.arcgis.com/vJlmDE1PmdTcJF0N/arcgis/rest/services/Frontenac_Road_Nework_View/FeatureServer/0/query?where=1%3D1&outFields=NAME_FULL,MUNICIPALITY&resultOffset=${offset}&resultRecordCount=${pageSize}&f=json&orderByFields=MUNICIPALITY,NAME_FULL`;
        try {
          const response = await fetch(url);
          const data = await response.json();

          if (data.error) {
            resultText.innerHTML = `<i class="ph-bold ph-x-circle text-rose-500 mr-2 align-middle"></i><span>Error: ${data.error.message}</span>`;
            result.classList.remove('hidden', 'border-emerald-500', 'border-amber-500');
            result.classList.add('border-rose-500');
            keepFetching = false;
            break;
          }

          if (!data.features || data.features.length === 0) {
            keepFetching = false;
            break;
          }
          
          totalFetched += data.features.length;
          loadingTextGlobal.textContent = `Loading road data... Fetched ${totalFetched} records.`;

          data.features.forEach(f => {
            if (f.attributes && f.attributes.NAME_FULL) {
              const roadName = f.attributes.NAME_FULL.trim().toUpperCase();
              const rawMunicipality = f.attributes.MUNICIPALITY;
              const normalizedMunicipality = normalizeMunicipalityName(rawMunicipality || "UNKNOWN");
              
              allEntries.add(JSON.stringify({ name: roadName, municipality: normalizedMunicipality }));
              if (rawMunicipality) uniqueNormalizedMunicipalities.add(normalizedMunicipality);
            }
          });

          keepFetching = typeof data.exceededTransferLimit === 'boolean' ? data.exceededTransferLimit : data.features.length === pageSize;
          if (keepFetching) offset += pageSize;

        } catch (e) {
          resultText.innerHTML = `<i class="ph-bold ph-x-circle text-rose-500 mr-2 align-middle"></i><span>Fetch error. Check console.</span>`;
          result.classList.remove('hidden', 'border-emerald-500', 'border-amber-500');
          result.classList.add('border-rose-500');
          keepFetching = false;
        }
      }

      loadingIndicatorGlobal.classList.add('hidden');
      roadData = Array.from(allEntries).map(entry => JSON.parse(entry));
      updateSearchPool();
      populateMunicipalityDropdown();

      if (roadData.length > 0) {
        const now = new Date();
        lastUpdatedEl.textContent = `Data last fetched: ${now.toLocaleDateString()} at ${now.toLocaleTimeString()}`;
        resultText.innerHTML = `<i class="ph-bold ph-check-circle text-emerald-500 mr-2 align-middle"></i><span>Loaded ${roadData.length} unique road entries.</span>`;
        result.classList.remove('hidden', 'border-rose-500', 'border-amber-500');
        result.classList.add('border-emerald-500');
        exportBtn.disabled = false;
        setTimeout(() => result.classList.add('hidden'), 4000);
      } else if (!resultText.textContent.includes('Error')) {
        resultText.innerHTML = `<i class="ph-bold ph-warning-circle text-amber-500 mr-2 align-middle"></i><span>No road data found.</span>`;
        result.classList.remove('hidden', 'border-emerald-500', 'border-rose-500');
        result.classList.add('border-amber-500');
      }
      showByMunicipalityBtn.disabled = municipalityFilter.value === "";
    }

    function updateSearchPool() {
      const currentNormMunicipality = normalizeMunicipalityName(municipalityFilter.value);
      currentSearchPool = currentNormMunicipality 
        ? roadData.filter(road => road.municipality === currentNormMunicipality) 
        : roadData;
    }

    function populateMunicipalityDropdown() {
      municipalityFilter.innerHTML = '<option value="">All Municipalities</option>';
      Array.from(uniqueNormalizedMunicipalities).sort().forEach(munNorm => {
        const option = document.createElement('option');
        option.value = munNorm;
        option.textContent = munNorm.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
        municipalityFilter.appendChild(option);
      });
    }

    function showSuggestions(input) {
      suggestionsDiv.innerHTML = '';
      selectedSuggestionIndex = -1;

      if (input.length < 2) {
        suggestionsDiv.classList.remove('is-visible');
        roadSearch.setAttribute('aria-expanded', 'false');
        return;
      }

      const inputUpper = input.toUpperCase();
      const uniqueRoadNames = Array.from(new Set(currentSearchPool.map(road => road.name))).sort();
      
      const matches = uniqueRoadNames.filter(name => {
        const words = name.split(' ');
        return words.some(word => word.startsWith(inputUpper));
      });

      if (matches.length > 0) {
        matches.slice(0, 10).forEach((match, index) => {
          const div = document.createElement('div');
          div.className = 'suggestion px-4 py-3 cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors duration-200 text-zinc-700 dark:text-zinc-300';
          div.textContent = match;
          div.setAttribute('role', 'option');
          div.setAttribute('id', `suggestion-${index}`);
          div.onclick = () => selectSuggestion(match);
          div.onmouseover = () => updateSelectedSuggestionHighlight(index);
          suggestionsDiv.appendChild(div);
        });
        suggestionsDiv.classList.add('is-visible');
        roadSearch.setAttribute('aria-expanded', 'true');
      } else {
          const div = document.createElement('div');
          div.className = 'px-4 py-3 text-zinc-400 dark:text-zinc-500';
          div.textContent = 'No road names match your query.';
          suggestionsDiv.appendChild(div);
          suggestionsDiv.classList.add('is-visible');
          roadSearch.setAttribute('aria-expanded', 'true');
      }
      updateSelectedSuggestionVisuals();
    }

    const debouncedShowSuggestions = debounce(showSuggestions, 150);

    function selectSuggestion(name) {
      roadSearch.value = name;
      suggestionsDiv.innerHTML = '';
      suggestionsDiv.classList.remove('is-visible');
      roadSearch.setAttribute('aria-expanded', 'false');
      selectedSuggestionIndex = -1;
      displayResult(name);
      municipalityRoadsResult.classList.add('hidden');
    }
    
    function updateSelectedSuggestionHighlight(index) {
        selectedSuggestionIndex = index;
        updateSelectedSuggestionVisuals();
    }

    function updateSelectedSuggestionVisuals() {
      const items = suggestionsDiv.getElementsByClassName('suggestion');
      Array.from(items).forEach((item, idx) => {
        if (idx === selectedSuggestionIndex) {
          item.classList.add('bg-zinc-100', 'dark:bg-zinc-800');
          roadSearch.setAttribute('aria-activedescendant', `suggestion-${idx}`);
          item.scrollIntoView({ block: 'nearest', inline: 'start' });
        } else {
          item.classList.remove('bg-zinc-100', 'dark:bg-zinc-800');
        }
      });
    }

    function displayResult(nameInput) {
      const normalizedRoadName = nameInput.trim().toUpperCase();
      if (!normalizedRoadName) {
          resultText.innerHTML = `<i class="ph-bold ph-warning-circle text-amber-500 mr-2 align-middle"></i><span>Please enter a road name to search.</span>`;
          result.classList.remove('hidden', 'border-emerald-500', 'border-rose-500');
          result.classList.add('border-amber-500');
          similarResults.classList.add('hidden');
          return;
      }

      const selectedNormMunicipality = normalizeMunicipalityName(municipalityFilter.value);
      let roadExists = false;
      let existenceMessage = "";

      const foundRoads = currentSearchPool.filter(road => road.name === normalizedRoadName);
      roadExists = foundRoads.length > 0;

      if (selectedNormMunicipality) {
        existenceMessage = roadExists ?
          `Yes, "${nameInput}" exists in ${selectedNormMunicipality.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ')}.` :
          `No, "${nameInput}" was not found in ${selectedNormMunicipality.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ')}.`;
      } else {
        const municipalitiesContainingRoad = roadData
              .filter(road => road.name === normalizedRoadName)
              .map(road => road.municipality.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' '))
              .filter((value, index, self) => self.indexOf(value) === index);

        roadExists = municipalitiesContainingRoad.length > 0;
        existenceMessage = roadExists ?
          `Yes, "${nameInput}" exists. Found in: ${municipalitiesContainingRoad.join(', ')}.` :
          `No, "${nameInput}" was not found in any municipality.`;
      }

      result.classList.remove('hidden', 'border-rose-500', 'border-emerald-500', 'border-amber-500');
      if (roadExists) {
        result.classList.add('border-emerald-500');
        resultText.innerHTML = `<i class="ph-bold ph-check-circle text-emerald-500 mr-2 align-middle"></i><span>${existenceMessage}</span>`;
      } else {
        result.classList.add('border-rose-500');
        resultText.innerHTML = `<i class="ph-bold ph-x-circle text-rose-500 mr-2 align-middle"></i><span>${existenceMessage}</span>`;
        findSimilarRoadNames(normalizedRoadName, selectedNormMunicipality);
      }
      
      municipalityRoadsResult.classList.add('hidden');
      suggestionsDiv.classList.remove('is-visible');
      roadSearch.setAttribute('aria-expanded', 'false');
    }

    function findSimilarRoadNames(name, currentNormMunicipality = "") {
      similarNamesList.innerHTML = '';
      const uniqueNames = Array.from(new Set(currentSearchPool.map(r => r.name))).sort();

      const scoredMatches = uniqueNames
        .map(roadName => ({ name: roadName, dist: levenshtein(name, roadName) }))
        .filter(item => item.name !== name && item.dist <= 4)
        .sort((a, b) => a.dist - b.dist)
        .slice(0, 5);

      if (scoredMatches.length === 0) {
        similarResults.classList.add('hidden');
      } else {
        similarResults.classList.remove('hidden');
        const munText = currentNormMunicipality ? ` in ${currentNormMunicipality.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ')}` : ' (all municipalities)';
        document.querySelector('#similarResults h5').textContent = `Similar road names${munText}`;
        scoredMatches.forEach(match => {
          const li = document.createElement('li');
          li.className = 'px-4 py-3 cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors duration-200 text-zinc-700 dark:text-zinc-300';
          li.textContent = match.name;
          li.onclick = () => selectSuggestion(match.name);
          similarNamesList.appendChild(li);
        });
      }
    }

    function displayRoadsByMunicipality() {
      municipalityRoadsList.innerHTML = '';
      const selectedNormMun = normalizeMunicipalityName(municipalityFilter.value);

      if (!selectedNormMun) {
        municipalityRoadsResult.classList.add('hidden');
        resultText.innerHTML = `<i class="ph-bold ph-warning-circle text-amber-500 mr-2 align-middle"></i><span>Please select a municipality first.</span>`;
        result.classList.remove('hidden', 'border-rose-500', 'border-emerald-500');
        result.classList.add('border-amber-500');
        similarResults.classList.add('hidden');
        return;
      }
      
      const munDisplayName = selectedNormMun.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
      selectedMunDisplay.textContent = munDisplayName;

      const roadsInMun = currentSearchPool
        .map(road => road.name)
        .filter((name, index, self) => self.indexOf(name) === index)
        .sort();

      munRoadCount.textContent = `${roadsInMun.length} roads`;

      if (roadsInMun.length === 0) {
        municipalityRoadsList.innerHTML = '<li class="px-4 py-3 text-zinc-500 dark:text-zinc-400">No roads found for this municipality.</li>';
      } else {
        roadsInMun.forEach(roadName => {
          const li = document.createElement('li');
          li.className = 'px-4 py-3 cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors duration-200 text-zinc-700 dark:text-zinc-300';
          li.textContent = roadName;
          li.onclick = () => {
            roadSearch.value = roadName;
            displayResult(roadName);
            suggestionsDiv.classList.remove('is-visible');
          };
          municipalityRoadsList.appendChild(li);
        });
      }
      municipalityRoadsResult.classList.remove('hidden');
      result.classList.add('hidden'); 
      similarResults.classList.add('hidden'); 
      suggestionsDiv.classList.remove('is-visible');
    }

    function downloadCSV() {
      const selectedMunicipality = municipalityFilter.value;
      let exportData = currentSearchPool;
      let filename = 'frontenac_all_unique_road_names.csv';
      
      if (selectedMunicipality) {
        const munSlug = selectedMunicipality.toLowerCase().replace(/\s+/g, '_');
        filename = `frontenac_roads_${munSlug}.csv`;
      }
      
      const uniqueRoadNames = Array.from(new Set(exportData.map(item => item.name))).sort();
      
      if (uniqueRoadNames.length === 0) {
          showToast("No road data available to export.");
          return;
      }
      
      let csvContent = 'Road Name\n';
      csvContent += uniqueRoadNames.join('\n');
      
      const encodedUri = encodeURI('data:text/csv;charset=utf-8,' + csvContent);
      const link = document.createElement('a');
      link.setAttribute('href', encodedUri);
      link.setAttribute('download', filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      showToast(`Exported ${uniqueRoadNames.length} roads successfully.`);
    }

    roadSearch.addEventListener('input', () => {
        debouncedShowSuggestions(roadSearch.value);
        municipalityRoadsResult.classList.add('hidden');
    });

    municipalityFilter.addEventListener('change', () => {
      updateSearchPool();
      showByMunicipalityBtn.disabled = municipalityFilter.value === "";
      if (roadSearch.value.length >= 2) {
          showSuggestions(roadSearch.value);
      } else {
          suggestionsDiv.classList.remove('is-visible');
      }
      result.classList.add('hidden');
      similarResults.classList.add('hidden');
      municipalityRoadsResult.classList.add('hidden');
    });

    roadSearch.addEventListener('keydown', (e) => {
      const items = suggestionsDiv.getElementsByClassName('suggestion');
      const activeSuggestions = Array.from(items);

      if (e.key === 'Enter') {
        e.preventDefault(); 
        if (selectedSuggestionIndex >= 0 && selectedSuggestionIndex < activeSuggestions.length && suggestionsDiv.classList.contains('is-visible')) {
          selectSuggestion(activeSuggestions[selectedSuggestionIndex].textContent);
        } else {
          displayResult(roadSearch.value); 
        }
        suggestionsDiv.innerHTML = '';
        suggestionsDiv.classList.remove('is-visible');
        roadSearch.setAttribute('aria-expanded', 'false');
        selectedSuggestionIndex = -1;
      } else if (e.key === 'ArrowDown') {
        if (suggestionsDiv.classList.contains('is-visible') && activeSuggestions.length > 0) {
            e.preventDefault();
            selectedSuggestionIndex = (selectedSuggestionIndex + 1) % activeSuggestions.length;
            updateSelectedSuggestionVisuals();
        }
      } else if (e.key === 'ArrowUp') {
        if (suggestionsDiv.classList.contains('is-visible') && activeSuggestions.length > 0) {
            e.preventDefault();
            selectedSuggestionIndex = (selectedSuggestionIndex - 1 + activeSuggestions.length) % activeSuggestions.length;
            updateSelectedSuggestionVisuals();
        }
      } else if (e.key === 'Escape') {
        suggestionsDiv.innerHTML = '';
        suggestionsDiv.classList.remove('is-visible');
        roadSearch.setAttribute('aria-expanded', 'false');
        selectedSuggestionIndex = -1;
      }
    });
    
    document.addEventListener('click', function(event) {
        const isClickInsideSearch = roadSearch.contains(event.target);
        const isClickInsideSuggestions = suggestionsDiv.contains(event.target);
        if (!isClickInsideSearch && !isClickInsideSuggestions) {
            suggestionsDiv.classList.remove('is-visible');
            roadSearch.setAttribute('aria-expanded', 'false');
        }
    });

    clearResultBtn.addEventListener('click', () => {
      result.classList.add('hidden');
    });

    exportBtn.addEventListener('click', downloadCSV);

    clearResultsBtn.addEventListener('click', () => {
      roadSearch.value = '';
      suggestionsDiv.innerHTML = '';
      suggestionsDiv.classList.remove('is-visible');
      roadSearch.setAttribute('aria-expanded', 'false');
      result.classList.add('hidden');
      similarResults.classList.add('hidden');
      municipalityRoadsResult.classList.add('hidden');
      municipalityFilter.value = ""; 
      updateSearchPool();
      showByMunicipalityBtn.disabled = true;
      selectedSuggestionIndex = -1;
    });

    showByMunicipalityBtn.addEventListener('click', displayRoadsByMunicipality);

    document.getElementById('darkModeToggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });

    document.getElementById('currentYear').textContent = new Date().getFullYear();

    exportBtn.disabled = true;
    showByMunicipalityBtn.disabled = true;
    fetchAllRoadData();
  </script>
</body>
</html>
